# ============================================================
#   SparkDuels  -  kits.yml
#   Default super-OP kits. Generated on first start, editable.
#   Schema:
#     KitName:
#       icon: MATERIAL
#       helmet/chestplate/leggings/boots:
#         type: MATERIAL
#         enchants: { enchant: level }
#       offhand: { type: MATERIAL }        # optional
#       items:                              # list
#         - type: MATERIAL
#           amount: 1
#           slot: 0                         # optional fixed hotbar slot
#           enchants: { enchant: level }    # optional
#           potion: STRONG_HEALING          # optional (PotionType)
#           name: "<text>"                  # optional MiniMessage name
#   Enchant keys = vanilla names (sharpness, protection, density...).
# ============================================================

